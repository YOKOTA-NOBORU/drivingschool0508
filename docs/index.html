<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>運転教本アプリ</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./pdf-viewer.css">
  <link rel="manifest" href="./manifest.json">
</head>
<body>
<main class="wrap">
  <section class="menu-card">
    <div class="app-title">運転教本アプリ</div>

    <div class="menu-body">
      <div class="stage-tabs">
        <button id="stage1" class="stage active" data-stage="1">第1段階</button>
        <button id="stage2" class="stage" data-stage="2">第2段階</button>
      </div>

      <div class="toolbar">
        <div>
          <div class="field-label">教習項目を選択</div>
          <select id="itemSelect"></select>
        </div>
        <div>
          <div class="field-label">言語</div>
          <select id="lang">
            <option value="vi">ベトナム語</option>
            <option value="en">英語</option>
            <option value="zh">中国語</option>
            <option value="pt">ポルトガル語</option>
          </select>
        </div>
      </div>

      <div class="nav-row">
        <button id="prevBtn">◀ 前へ</button>
        <button id="nextBtn">次へ ▶</button>
      </div>
    </div>
  </section>

  <section class="card" id="headerCard"></section>
  <section id="list"></section>
</main>

<div id="pdfModal" class="pdf-modal" aria-hidden="true">
  <div class="pdf-dialog" role="dialog" aria-modal="true" aria-label="教本PDF">
    <div class="pdf-dialog-header">
      <strong>教本PDF</strong>
      <button id="pdfCloseBtn" type="button" aria-label="PDFを閉じる">✕</button>
    </div>
    <iframe
      id="pdfFrame"
      title="教本PDF"
      src="./pdf/1-1.pdf#view=FitH"
      loading="lazy">
    </iframe>
  </div>
</div>

<script src="./mobile-data.js"></script>
<script src="./data.js"></script>
<script src="./app.js"></script>
<script src="./pdf-viewer.js"></script>
</body>
</html>
