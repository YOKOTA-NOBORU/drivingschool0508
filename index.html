function cur(){return ITEMS.find(x=>x.id===currentId)||ITEMS[0]}function fill(){itemSelect.innerHTML="";ITEMS.forEach(it=>{const o=document.createElement("option");o.value=it.id;o.textContent=String(it.id).padStart(2,"0")+" "+it.title+"（"+it.blocks.length+"）";itemSelect.appendChild(o)});itemSelect.value=currentId}
function renderHeader(){const it=cur();headerCard.innerHTML=`<span class="badge">第1段階 ${it.id}項目</span><div class="title">${it.title}</div><div class="count">${it.blocks.length} 説明</div><div class="toggle-grid">${kinds.map(k=>`<button class="${visibleKinds.has(k)?"active":""}" data-kind="${k}">${k}</button>`).join("")}</div>`;headerCard.querySelectorAll("[data-kind]").forEach(b=>b.onclick=()=>{const k=b.dataset.kind;if(visibleKinds.has(k)){visibleKinds.delete(k)}else{visibleKinds.add(k)}renderHeader();renderList();});}
function renderList(){const lang=langSelect.value,it=cur();list.innerHTML="";it.blocks.forEach((b,i)=>{const box=document.createElement("article");box.className="section"+(b.title.includes("手順")||b.title.includes("カーブ")?" step":"");const ja=b.ja.filter(x=>visibleKinds.has(x.label)).map(x=>`<div class="jp-block"><div class="jp-label">${x.label}</div><p class="jp-text">${x.text}</p></div>`).join("");const fr=b[lang].filter((x,idx)=>visibleKinds.has(b.ja[idx].label)).map(x=>`<div class="foreign-block"><div class="foreign-label">${x.label}</div><p class="foreign-text">${x.text}</p></div>`).join("");box.innerHTML=`<button class="accordion" type="button"><span>${i+1}. ${b.title}</span><span class="mark">▶</span></button>${ja}<div class="foreign">${fr}<button class="speak" type="button">🔊 ${LANGS[lang]}</button> <button class="stop" type="button">■ 停止</button></div>`;const acc=box.querySelector(".accordion"),f=box.querySelector(".foreign"),m=box.querySelector(".mark");acc.onclick=()=>{f.classList.toggle("show");m.textContent=f.classList.contains("show")?"▼":"▶"};box.querySelector(".speak").onclick=()=>speak(b[lang].filter((x,idx)=>visibleKinds.has(b.ja[idx].label)).map(x=>x.label+". "+x.text).join(". "),lang);box.querySelector(".stop").onclick=()=>speechSynthesis.cancel();list.appendChild(box)})}
function render(){fill();renderHeader();renderList()}itemSelect.onchange=()=>{currentId=parseInt(itemSelect.value,10);render();window.scrollTo({top:0,behavior:"smooth"})};langSelect.onchange=()=>renderList();render();
</script></body></html>
