<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>教習所多言語音声アプリ</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><header><h1>教習所多言語音声アプリ</h1><p>165フレーズ + DeepL会話翻訳 + 音声再生</p></header><main><section class="panel"><h2>会話翻訳</h2><label>翻訳先言語</label><select id="targetLang"><option value="VI" data-speech="vi-VN">ベトナム語</option><option value="EN-US" data-speech="en-US">英語</option><option value="ZH" data-speech="zh-CN">中国語</option><option value="KO" data-speech="ko-KR">韓国語</option><option value="PT-BR" data-speech="pt-BR">ポルトガル語</option><option value="ID" data-speech="id-ID">インドネシア語</option></select><label>日本語</label><textarea id="freeText" rows="4" placeholder="例：次の信号交差点を左に曲がってください"></textarea><div class="grid2"><button id="translateBtn" type="button">翻訳する</button><button id="clearBtn" type="button" class="sub">クリア</button></div><p id="status">準備完了</p><div class="result"><strong>翻訳結果</strong><div id="resultText">ここに翻訳結果が表示されます。</div><button id="speakResultBtn" type="button" class="dark">音声で再生</button></div></section><section class="panel"><h2>登録フレーズ</h2><div class="tools"><input id="searchBox" type="search" placeholder="検索：右、停止、確認など"><select id="categoryFilter"><option value="all">すべて</option></select></div><p class="small">表示：<span id="shownCount">0</span>件 / 全<span id="totalCount">0</span>件</p><div id="phraseList" class="phraseList"></div></section></main><script src="phrases.js"></script><script src="script.js"></script></body></html>
